<!doctype html>
<html lang="en">
  <head>
    <!-- injecting aws rum -->
    <script>
      (function (n, i, v, r, s, c, x, z) {
        x = window.AwsRumClient = { q: [], n: n, i: i, v: v, r: r, c: c };
        window[n] = function (c, p) {
          x.q.push({ c: c, p: p });
        };
        z = document.createElement('script');
        z.async = true;
        z.src = s;
        document.head.insertBefore(z, document.head.firstChild);
      })(
        'cwr',
        '508a0bf4-092e-40b4-a770-5c1db2f8281',
        '1.0.0',
        'us-east-1',
        'https://client.rum.us-east-1.amazonaws.com/3.x/cwr.js',
        {
          sessionSampleRate: 1,
          endpoint: 'https://dataplane.rum.us-east-1.amazonaws.com',
          telemetries: ['performance', 'errors', 'http'],
          allowCookies: false,
          identityPoolId: 'us-east-1:bd5ed77a-d724-4745-a689-b4a22525ace0',
        }
      );
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Card</title>
    <link rel="stylesheet" href="card.css" />
  </head>

  <body>
    <div class="center">
      <h1 id="card-title">Card Settings</h1>
      <div class="layout">
        <div class="card" id="card">
          <h2 id="name"></h2>
          <div>
            <img id="profile-img" alt="Profile picture" src="" />
          </div>
          <div id="divider"></div>
          <div class="bio" id="bio"></div>
          <div class="info" id="infoSection">
            <div id="dobRow">
              <img src="./images/birthday.svg" />
              <span id="dob"></span>
            </div>
            <div id="emailRow">
              <img src="./images/mail.svg" />
              <span id="email"></span>
            </div>
            <div id="factRow">
              <img src="./images/bulb.svg" />
              <span id="fact"></span>
            </div>
            <div id="musicRow">
              <img src="./images/music.svg" />
              <span id="music"></span>
            </div>
          </div>
        </div>

        <div class="panel">
          <h3>Customize</h3>

          <label>
            Background
            <input type="color" id="bgColor" value="#fffdf7" />
          </label>

          <label>
            Bio Text Color
            <input type="color" id="bioTextColor" value="#808080" />
          </label>

          <label>
            Text Color
            <input type="color" id="textColor" value="#000000" />
          </label>

          <label
            >Show DOB <input type="checkbox" id="toggleDob" checked
          /></label>
          <label
            >Show Email <input type="checkbox" id="toggleEmail" checked
          /></label>
          <label
            >Show Fact <input type="checkbox" id="toggleFact" checked
          /></label>
          <label
            >Show Music <input type="checkbox" id="toggleMusic" checked
          /></label>
        </div>
      </div>
    </div>

    <script></script>

    <script src="scripts/card-script.js"></script>
  </body>
</html>
