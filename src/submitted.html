<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="index.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <div class="center">
      <div class="container submitted-screen" id="output">
        <h2>Double Check The Data Is Correct!</h2>
        <p>
          below is all the data you have given on the forms on the previous page
        </p>
      </div>
    </div>
  </body>
  <script>
    const data = JSON.parse(sessionStorage.getItem('formData'));
    const outputDiv = document.getElementById('output');
    if (data) {
      outputDiv.innerHTML += `
                    <table>
                        <thead>
                            <tr>
                                <th>Form Field</th>
                                <th>Value Given</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><th>Full Name</th><td>${data.name}</td></tr>
                            <tr><th>Email</th><td>${data.email}</td></tr>
                            <tr><th>DOB</th><td>${data.dob}</td></tr>
                            <tr><th>Bio</th><td>${data.bio}</td></tr>
                            <tr><th>Fact About You</th><td>${data.fact}</td></tr>
                            <tr><th>Favourite Music Artist</th><td>${data.music}</td></tr>
                        </tbody>
                    </table>
                    <button onclick="window.location.href='card.html'" id="submit">Generate Card</button>
                    <button onclick="window.location.href='index.html'" id="submit">Go Back</button>
                    `;
    } else {
      outputDiv.innerHTML += '<p>No form data found.</p>';
    }
  </script>
</html>
